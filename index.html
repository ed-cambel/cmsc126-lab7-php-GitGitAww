<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lab 7 - PHP + MySQL</title>
    <script src="functions.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Student Registration</h2>
            <small>All fields marked * are required. </small>
        </div>

        <form id="registrationForm" enctype="multipart/form-data">

            <!-- PERSONAL INFO -->
            <div class="section">
                <div class="section-title">PERSONAL INFORMATION</div>

                <div class="row">
                    <div class="field">
                        <label>Name <span class="required">*</span></label>
                        <input type="text" name="name" maxlength="40" required placeholder="e.g Juan dela Cruz">
                    </div>
                
                    <div class="field">
                        <label>Age <span class="required">*</span></label>
                        <input type="number" name="age" min="0" max="99" required placeholder="0 - 99">
                    </div>
                </div>
            </div>

            <div class="field full-width">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" maxlength="40" pattern="^[a-zA-Z0-9._%+-]+@up\.edu\.ph$" required
                    placeholder="e.g. juan@up.edu.ph">
                <small>Must be a valid email address (max 40 chars).</small>
            </div>

            <!-- ACADEMIC INFO -->
            <div class="section">
                <div class="section-title"> ACADEMIC INFORMATION</div>

                <div class="row">
                    <div class="field">
                        <label>Course <span class="required">*</span></label>
                        <input type="text" name="course" maxlength="40" required placeholder="e.g BS Computer Science">
                    </div>
                
                    <div class="field">
                        <label>Year Level <span class="required">*</span></label>
                        <select name="year_level" required>
                            <option value="">Select Year</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">Nth</option>
                        </select>
                    </div>
                </div>

                <label>Graduating this year? <span class="required">*</span></label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="graduating" value="1"> Yes
                    </label>
                </div>
            </div>

            <!-- PROFILE PHOTO -->
            <div class="section">
                <div class="section-title">PROFILE PHOTO</div>

                <label>Profile Image <span class="required">*</span></label>
                <div class="file-box">
                    <input type="file" name="image_path" accept=".jpg,.png,.gif,.webp" required>
                    <p>Choose a file or drag it here</p>
                    <small>JPG, PNG, GIF, WEBP accepted</small>
                </div>
            </div>

            <div class="section">
                <button type="button" class="submit-btn" onclick="submitRegistration()">Submit Registration</button>
            </div>

           
        </form>
         <!-- RECORD MANAGEMENT -->
            <div class="record-section">
                <div class="section-title">RECORD MANAGEMENT</div>

                <div class="search-box">
                    <label>LOOK UP BY STUDENT ID</label>
                    <input type="text" id="IDInput" placeholder="Enter Student ID">
                </div>

                <div class="btn-group">
                    <button class="btn" id="searchBtn">Search</button>
                    <button class="btn update" id="updateBtn">Update</button>
                    <button class="btn delete" onclick="confirmDelete()">Delete</button>
                </div>
                <br>
                <div id="resultDisplay"></div>
            </div>
    </div>
</body>
</html>
